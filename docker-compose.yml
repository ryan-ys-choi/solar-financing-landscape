version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: solar_db
    environment:
      POSTGRES_DB: solar_financing
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d solar_financing"]
      interval: 10s
      timeout: 5s
      retries: 5

  dashboard:
    build:
      context: ./dashboard
    container_name: solar_dashboard
    environment:
      # Inside the compose network, talk to postgres by service name on 5432
      # (not the host-mapped 5433).
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: solar_financing
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD}
    ports:
      - "8501:8501"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
